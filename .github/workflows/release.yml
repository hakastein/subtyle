name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform windows/amd64 -clean -trimpath

      - name: Rename artifact
        shell: pwsh
        run: Move-Item build/bin/subtitles-editor.exe build/bin/subtyle-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: subtyle-windows
          path: build/bin/subtyle-windows-amd64.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux (untested)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform linux/amd64 -clean -trimpath

      - name: Rename artifact
        run: mv build/bin/subtitles-editor build/bin/subtyle-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: subtyle-linux
          path: build/bin/subtyle-linux-amd64
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/subtyle-windows/subtyle-windows-amd64.exe
            artifacts/subtyle-linux/subtyle-linux-amd64
          generate_release_notes: true
          body: |
            ## Downloads

            - **Windows** (primary target, tested): `subtyle-windows-amd64.exe`
            - **Linux** (builds in CI, **not tested** — use at your own risk): `subtyle-linux-amd64`

            Only the Windows build is regularly exercised. The Linux binary is produced by the same build pipeline but has not been run or verified. If it breaks, PRs welcome.
